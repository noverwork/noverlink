name: Release CLI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.83"

jobs:
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-unknown-linux-gnu

      - name: Build
        run: cargo build --release --package noverlink-cli --target x86_64-unknown-linux-gnu

      - name: Package
        run: |
          mkdir -p artifacts
          cp target/x86_64-unknown-linux-gnu/release/noverlink-cli artifacts/noverlink
          cd artifacts && tar czf noverlink-linux-x64.tar.gz noverlink && rm noverlink

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: noverlink-linux-x64
          path: artifacts/noverlink-linux-x64.tar.gz

  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-unknown-linux-gnu

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --package noverlink-cli --target aarch64-unknown-linux-gnu

      - name: Package
        run: |
          mkdir -p artifacts
          cp target/aarch64-unknown-linux-gnu/release/noverlink-cli artifacts/noverlink
          cd artifacts && tar czf noverlink-linux-arm64.tar.gz noverlink && rm noverlink

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: noverlink-linux-arm64
          path: artifacts/noverlink-linux-arm64.tar.gz

  build-macos-x64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-apple-darwin

      - name: Build
        run: cargo build --release --package noverlink-cli --target x86_64-apple-darwin

      - name: Package
        run: |
          mkdir -p artifacts
          cp target/x86_64-apple-darwin/release/noverlink-cli artifacts/noverlink
          cd artifacts && tar czf noverlink-macos-x64.tar.gz noverlink && rm noverlink

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: noverlink-macos-x64
          path: artifacts/noverlink-macos-x64.tar.gz

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-apple-darwin

      - name: Build
        run: cargo build --release --package noverlink-cli --target aarch64-apple-darwin

      - name: Package
        run: |
          mkdir -p artifacts
          cp target/aarch64-apple-darwin/release/noverlink-cli artifacts/noverlink
          cd artifacts && tar czf noverlink-macos-arm64.tar.gz noverlink && rm noverlink

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: noverlink-macos-arm64
          path: artifacts/noverlink-macos-arm64.tar.gz

  build-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc

      - name: Build
        run: cargo build --release --package noverlink-cli --target x86_64-pc-windows-msvc

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item target/x86_64-pc-windows-msvc/release/noverlink-cli.exe artifacts/noverlink.exe
          Compress-Archive -Path artifacts/noverlink.exe -DestinationPath artifacts/noverlink-windows-x64.zip
          Remove-Item artifacts/noverlink.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: noverlink-windows-x64
          path: artifacts/noverlink-windows-x64.zip

  release:
    runs-on: ubuntu-latest
    needs:
      - build-linux-x64
      - build-linux-arm64
      - build-macos-x64
      - build-macos-arm64
      - build-windows-x64
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            artifacts/*
          generate_release_notes: true

  publish-npm:
    runs-on: ubuntu-latest
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Check if version exists
        id: check
        run: |
          cd packages/npm-cli
          VERSION=$(node -p "require('./package.json').version")
          if npm view @noverlink/cli@$VERSION version 2>/dev/null; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.check.outputs.skip != 'true'
        run: |
          cd packages/npm-cli
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
