name: Release CLI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.83"

jobs:
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-unknown-linux-gnu

      - name: Build
        run: cargo build --release --package noverlink-cli --target x86_64-unknown-linux-gnu

      - name: Package
        run: |
          mkdir -p artifacts
          cp target/x86_64-unknown-linux-gnu/release/noverlink-cli artifacts/noverlink
          cd artifacts && tar czf noverlink-linux-x64.tar.gz noverlink && rm noverlink

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: noverlink-linux-x64
          path: artifacts/noverlink-linux-x64.tar.gz

  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-unknown-linux-gnu

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --package noverlink-cli --target aarch64-unknown-linux-gnu

      - name: Package
        run: |
          mkdir -p artifacts
          cp target/aarch64-unknown-linux-gnu/release/noverlink-cli artifacts/noverlink
          cd artifacts && tar czf noverlink-linux-arm64.tar.gz noverlink && rm noverlink

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: noverlink-linux-arm64
          path: artifacts/noverlink-linux-arm64.tar.gz

  build-darwin-x64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-apple-darwin

      - name: Build
        run: cargo build --release --package noverlink-cli --target x86_64-apple-darwin

      - name: Package
        run: |
          mkdir -p artifacts
          cp target/x86_64-apple-darwin/release/noverlink-cli artifacts/noverlink
          cd artifacts && tar czf noverlink-darwin-x64.tar.gz noverlink && rm noverlink

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: noverlink-darwin-x64
          path: artifacts/noverlink-darwin-x64.tar.gz

  build-darwin-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-apple-darwin

      - name: Build
        run: cargo build --release --package noverlink-cli --target aarch64-apple-darwin

      - name: Package
        run: |
          mkdir -p artifacts
          cp target/aarch64-apple-darwin/release/noverlink-cli artifacts/noverlink
          cd artifacts && tar czf noverlink-darwin-arm64.tar.gz noverlink && rm noverlink

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: noverlink-darwin-arm64
          path: artifacts/noverlink-darwin-arm64.tar.gz

  build-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc

      - name: Build
        run: cargo build --release --package noverlink-cli --target x86_64-pc-windows-msvc

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item target/x86_64-pc-windows-msvc/release/noverlink-cli.exe artifacts/noverlink.exe
          Compress-Archive -Path artifacts/noverlink.exe -DestinationPath artifacts/noverlink-windows-x64.zip
          Remove-Item artifacts/noverlink.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: noverlink-windows-x64
          path: artifacts/noverlink-windows-x64.zip

  release:
    runs-on: ubuntu-latest
    needs:
      - build-linux-x64
      - build-linux-arm64
      - build-darwin-x64
      - build-darwin-arm64
      - build-windows-x64
    permissions:
      contents: write
    outputs:
      sha256_darwin_arm64: ${{ steps.checksums.outputs.sha256_darwin_arm64 }}
      sha256_darwin_x64: ${{ steps.checksums.outputs.sha256_darwin_x64 }}
      sha256_linux_arm64: ${{ steps.checksums.outputs.sha256_linux_arm64 }}
      sha256_linux_x64: ${{ steps.checksums.outputs.sha256_linux_x64 }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        id: checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt
          cat checksums.txt

          # Export checksums for Homebrew update
          echo "sha256_darwin_arm64=$(sha256sum noverlink-darwin-arm64.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "sha256_darwin_x64=$(sha256sum noverlink-darwin-x64.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "sha256_linux_arm64=$(sha256sum noverlink-linux-arm64.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "sha256_linux_x64=$(sha256sum noverlink-linux-x64.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            artifacts/*
          generate_release_notes: true

  update-homebrew:
    runs-on: ubuntu-latest
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update Homebrew Formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA_DARWIN_ARM64="${{ needs.release.outputs.sha256_darwin_arm64 }}"
          SHA_DARWIN_X64="${{ needs.release.outputs.sha256_darwin_x64 }}"
          SHA_LINUX_ARM64="${{ needs.release.outputs.sha256_linux_arm64 }}"
          SHA_LINUX_X64="${{ needs.release.outputs.sha256_linux_x64 }}"

          cat > homebrew/Formula/noverlink.rb << 'FORMULA'
          # typed: false
          # frozen_string_literal: true

          class Noverlink < Formula
            desc "Local-to-global tunneling CLI - expose your localhost to the web"
            homepage "https://github.com/noverwork/noverlink"
            version "VERSION_PLACEHOLDER"
            license "AGPL-3.0-or-later"

            on_macos do
              on_arm do
                url "https://github.com/noverwork/noverlink/releases/download/v#{version}/noverlink-darwin-arm64.tar.gz"
                sha256 "SHA_DARWIN_ARM64_PLACEHOLDER"
              end

              on_intel do
                url "https://github.com/noverwork/noverlink/releases/download/v#{version}/noverlink-darwin-x64.tar.gz"
                sha256 "SHA_DARWIN_X64_PLACEHOLDER"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/noverwork/noverlink/releases/download/v#{version}/noverlink-linux-arm64.tar.gz"
                sha256 "SHA_LINUX_ARM64_PLACEHOLDER"
              end

              on_intel do
                url "https://github.com/noverwork/noverlink/releases/download/v#{version}/noverlink-linux-x64.tar.gz"
                sha256 "SHA_LINUX_X64_PLACEHOLDER"
              end
            end

            def install
              bin.install "noverlink"
            end

            test do
              assert_match "noverlink", shell_output("#{bin}/noverlink --version")
            end
          end
          FORMULA

          # Replace placeholders
          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" homebrew/Formula/noverlink.rb
          sed -i "s/SHA_DARWIN_ARM64_PLACEHOLDER/$SHA_DARWIN_ARM64/g" homebrew/Formula/noverlink.rb
          sed -i "s/SHA_DARWIN_X64_PLACEHOLDER/$SHA_DARWIN_X64/g" homebrew/Formula/noverlink.rb
          sed -i "s/SHA_LINUX_ARM64_PLACEHOLDER/$SHA_LINUX_ARM64/g" homebrew/Formula/noverlink.rb
          sed -i "s/SHA_LINUX_X64_PLACEHOLDER/$SHA_LINUX_X64/g" homebrew/Formula/noverlink.rb

          cat homebrew/Formula/noverlink.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add homebrew/Formula/noverlink.rb
          git commit -m "chore(homebrew): update formula to v${{ steps.version.outputs.version }}"
          git push
