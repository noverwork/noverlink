name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '22'
  RUST_VERSION: '1.83'

jobs:
  # ─── TypeScript Build (Backend & Migrator) ─────────────────────────
  build-typescript:
    name: Build TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build Backend
        run: npm run backend:build

      - name: Build Migrator
        run: npm run migrator:build

      - name: Upload Backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: dist/apps/backend/
          retention-days: 7

      - name: Upload Migrator artifact
        uses: actions/upload-artifact@v4
        with:
          name: migrator-dist
          path: dist/apps/migrator/
          retention-days: 7

  # ─── Rust Build (Relay & CLI) ──────────────────────────────────────
  build-rust:
    name: Build Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build Relay (release)
        run: cargo build --release --package relay

      - name: Build CLI (release)
        run: cargo build --release --package noverlink-cli

      - name: Upload Relay artifact
        uses: actions/upload-artifact@v4
        with:
          name: relay-linux-amd64
          path: target/release/relay
          retention-days: 7

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-linux-amd64
          path: target/release/noverlink
          retention-days: 7

  # ─── Tests ─────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [build-typescript, build-rust]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Run all tests
        run: npm run test
