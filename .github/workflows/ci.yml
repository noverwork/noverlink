name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '22'
  RUST_VERSION: '1.83'
  REGISTRY: gitea.noverwork.com
  IMAGE_PREFIX: noverwork/noverlink

jobs:
  # ─── Lint & Test ───────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Build dependencies
        run: npx nx run-many --target=build --projects=@noverlink/ui-shared,@noverlink/interfaces,shared

      - name: Typecheck
        run: npm run typecheck

      - name: Lint (ESLint)
        run: npm run lint

      - name: Lint (Cargo fmt)
        run: cargo fmt --all -- --check

      - name: Lint (Clippy)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: npm run test

  # ─── Docker Build & Push ──────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/backend/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/frontend/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Build & Push Migrator
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/migrator/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-migrator:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-migrator:latest
          cache-from: type=gha,scope=migrator
          cache-to: type=gha,mode=max,scope=migrator

      - name: Build & Push Relay
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/relay/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-relay:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-relay:latest
          cache-from: type=gha,scope=relay
          cache-to: type=gha,mode=max,scope=relay

  # ─── CLI: Multi-platform Build ────────────────────────────────────
  build-cli:
    name: Build CLI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: noverlink-linux-x64
            binary: noverlink
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: noverlink-linux-arm64
            binary: noverlink
            cross: true
          - target: x86_64-apple-darwin
            os: macos-13
            artifact: noverlink-darwin-x64
            binary: noverlink
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: noverlink-darwin-arm64
            binary: noverlink
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: noverlink-win32-x64
            binary: noverlink.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build CLI (cross)
        if: matrix.cross
        run: cross build --release --package noverlink-cli --target ${{ matrix.target }}

      - name: Build CLI (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --package noverlink-cli --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz ${{ matrix.binary }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.artifact }}.zip ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*
          retention-days: 7

  # ─── CLI: Release to Gitea ───────────────────────────────────────
  release-cli:
    name: Release CLI
    runs-on: ubuntu-latest
    needs: [test, build-cli]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: noverlink-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum noverlink-* > checksums.txt
          cat checksums.txt

      - name: Create/Update Gitea Release
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="0.1.0"
          REPO="noverwork/noverlink"
          API="https://gitea.noverwork.com/api/v1"

          # Check if release exists
          RELEASE_ID=$(curl -s -H "Authorization: token $GITEA_TOKEN" \
            "$API/repos/$REPO/releases/tags/v$VERSION" | jq -r '.id // empty')

          if [ -z "$RELEASE_ID" ]; then
            # Create new release
            RELEASE_ID=$(curl -s -X POST -H "Authorization: token $GITEA_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"tag_name\": \"v$VERSION\", \"name\": \"v$VERSION\", \"body\": \"Release v$VERSION\", \"draft\": false}" \
              "$API/repos/$REPO/releases" | jq -r '.id')
            echo "Created release: $RELEASE_ID"
          else
            # Delete existing assets
            curl -s -H "Authorization: token $GITEA_TOKEN" \
              "$API/repos/$REPO/releases/$RELEASE_ID/assets" | jq -r '.[].id' | while read ASSET_ID; do
              curl -s -X DELETE -H "Authorization: token $GITEA_TOKEN" \
                "$API/repos/$REPO/releases/$RELEASE_ID/assets/$ASSET_ID"
            done
            echo "Updated release: $RELEASE_ID"
          fi

          # Upload assets
          for file in artifacts/*; do
            filename=$(basename "$file")
            echo "Uploading $filename..."
            curl -s -X POST -H "Authorization: token $GITEA_TOKEN" \
              -F "attachment=@$file" \
              "$API/repos/$REPO/releases/$RELEASE_ID/assets?name=$filename"
          done

  # ─── npm: Publish CLI Package ────────────────────────────────────
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: release-cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Check if version exists
        id: check
        working-directory: packages/npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view @noverlink/tunnel@$VERSION version 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Version $VERSION already published, skipping"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Version $VERSION not found, will publish"
          fi

      - name: Publish to npm
        if: steps.check.outputs.exists == 'false'
        working-directory: packages/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
