name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '22'
  RUST_VERSION: '1.83'
  REGISTRY: gitea.noverwork.com
  IMAGE_PREFIX: noverwork/noverlink

jobs:
  # ─── Lint & Test ───────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Build dependencies
        run: npx nx run-many --target=build --projects=@noverlink/ui-shared,@noverlink/interfaces,shared

      - name: Typecheck
        run: npm run typecheck

      - name: Lint (ESLint)
        run: npm run lint

      - name: Lint (Cargo fmt)
        run: cargo fmt --all -- --check

      - name: Lint (Clippy)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: npm run test

  # ─── Docker Build: Backend ─────────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/backend/Dockerfile
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Docker Build: Frontend ────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/frontend/Dockerfile
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Docker Build: Migrator ────────────────────────────────────────
  build-migrator:
    name: Build Migrator
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Migrator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/migrator/Dockerfile
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-migrator:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Docker Build: Relay ───────────────────────────────────────────
  build-relay:
    name: Build Relay
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Relay image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/relay/Dockerfile
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-relay:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Rust Build: CLI (binary artifact) ─────────────────────────────
  build-cli:
    name: Build CLI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build CLI (release)
        run: cargo build --release --package noverlink-cli

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-linux-amd64
          path: target/release/noverlink
          retention-days: 7
