<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Unavailable - Noverlink</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #020617;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 480px;
        }
        .icon-wrapper {
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem;
            background: rgba(251, 113, 133, 0.1);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-wrapper svg {
            width: 40px;
            height: 40px;
            color: #fb7185;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: white;
            margin-bottom: 1rem;
        }
        .message {
            color: #94a3b8;
            margin-bottom: 2rem;
            line-height: 1.6;
            font-size: 0.9375rem;
        }
        .domain {
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
            font-size: 0.8125rem;
            color: #94a3b8;
            background: #0f172a;
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: inline-block;
            margin-bottom: 2rem;
        }
        .divider {
            width: 48px;
            height: 1px;
            background: #334155;
            margin: 0 auto 1.5rem;
        }
        .footer {
            font-size: 0.75rem;
            color: #64748b;
        }
        .footer a {
            color: #2dd4bf;
            text-decoration: none;
            transition: color 150ms ease;
        }
        .footer a:hover {
            color: #5eead4;
        }
        .logo {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            color: #64748b;
            margin-top: 1rem;
        }
        .logo-icon {
            width: 16px;
            height: 16px;
            background: linear-gradient(135deg, #14b8a6, #2dd4bf);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-icon svg {
            width: 10px;
            height: 10px;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrapper">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 8v4M12 16h.01"/>
            </svg>
        </div>

        <h1>This site can't be reached</h1>
        <p class="message">
            The site at this address is currently offline or doesn't exist.
            Please check the URL or try again later.
        </p>

        <div class="domain">{{ host }}</div>

        <div class="divider"></div>

        <p class="footer">
            Are you the site owner?<br>
            <a href="https://noverlink.com/docs">Learn how to set up your connection</a>
        </p>

        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
            </div>
            <span>Powered by Noverlink</span>
        </div>
    </div>
</body>
</html>
